<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register Vehicle</title>
</head>
<body>
    <h1>Register Vehicle</h1>
    <form th:action="@{/vehicles/register}" th:object="${registration}" method="post">
        <label for="vin">VIN:</label>
        <input type="text" id="vin" th:field="*{vin}" required><br>
        <label for="make">Make:</label>
        <input type="text" id="make" th:field="*{make}" required><br>
        <label for="model">Model:</label>
        <input type="text" id="model" th:field="*{model}" required><br>
        <label for="year">Year:</label>
        <input type="number" id="year" th:field="*{year}" required><br>
        <label for="color">Color:</label>
        <input type="text" id="color" th:field="*{color}" required><br>
        <label for="firstName">First Name:</label>
        <input type="text" id="firstName" th:field="*{firstName}" required><br>
        <label for="lastName">Last Name:</label>
        <input type="text" id="lastName" th:field="*{lastName}" required><br>
        <label for="email">Email:</label>
        <input type="email" id="email" th:field="*{email}" required><br>
        <label for="phone">Phone:</label>
        <input type="text" id="phone" th:field="*{phone}" required><br>
        <label for="address">Address:</label>
        <input type="text" id="address" th:field="*{address}" required><br>
        <button type="submit">Register</button>
    </form>
</body>
</html>
