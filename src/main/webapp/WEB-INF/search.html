<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{base :: layout(~{::content})}">
<head></head>
<body>
    <div th:fragment="content">
        <div class="form-container">
            <h2 class="mb-4"><i class="bi bi-search"></i> Search Vehicles</h2>
            
            <div class="card mb-4">
                <div class="card-body">
                    <form class="row g-3">
                        <div class="col-md-6">
                            <label for="searchTerm" class="form-label">Search Term</label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="searchTerm" placeholder="VIN, Make, Model...">
                                <button class="btn btn-primary" type="submit">
                                    <i class="bi bi-search"></i> Search
                                </button>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label for="searchType" class="form-label">Search By</label>
                            <select class="form-select" id="searchType">
                                <option selected value="all">All Fields</option>
                                <option value="vin">VIN Number</option>
                                <option value="make">Make</option>
                                <option value="model">Model</option>
                                <option value="owner">Owner Name</option>
                            </select>
                        </div>
                    </form>
                </div>
            </div>

            <div class="card">
                <div class="card-header bg-primary text-white">
                    Search Results
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-striped table-hover">
                            <thead>
                                <tr>
                                    <th>VIN</th>
                                    <th>Make</th>
                                    <th>Model</th>
                                    <th>Year</th>
                                    <th>Owner</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Sample data - replace with Thymeleaf iteration -->
                                <tr>
                                    <td>1HGBH41JXMN109186</td>
                                    <td>Toyota</td>
                                    <td>Camry</td>
                                    <td>2022</td>
                                    <td>John Doe</td>
                                    <td>
                                        <a href="#" class="btn btn-sm btn-outline-primary">
                                            <i class="bi bi-eye"></i> View
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
